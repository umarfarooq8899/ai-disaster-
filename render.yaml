services:
  - type: web
    name: ai-disaster-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: oregon # Render's standard default region
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # User will be prompted to enter this during setup
      - key: JWT_SECRET
        generateValue: true # Render will generate a cryptographically secure random secret
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
